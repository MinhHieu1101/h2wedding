<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hieu & Ha</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="hero">
    <div class="logo">
      <div class="logo-names">
        <span class="groom">Hieu</span>
        <span class="ampersand">&amp;</span>
        <span class="bride">Ha</span>
      </div>
      <date>08.08.2026</date>
    </div>
  </header>

  <div class="page">
    <article class="card">
      <p class="eyebrow">Save the date</p>

      <h1 class="names">Minh Hieu &amp; Thuy Ha</h1>

      <p class="date">Saturday, August 8 · 2026</p>

      <div class="countdown" id="countdown">
        <div class="unit">
          <span class="number" id="days">00</span>
          <span class="label">Days</span>
        </div>
        <span class="divider" aria-hidden="true"></span>
        <div class="unit">
          <span class="number" id="hours">00</span>
          <span class="label">Hours</span>
        </div>
        <span class="divider" aria-hidden="true"></span>
        <div class="unit">
          <span class="number" id="minutes">00</span>
          <span class="label">Minutes</span>
        </div>
        <span class="divider" aria-hidden="true"></span>
        <div class="unit">
          <span class="number" id="seconds">00</span>
          <span class="label">Seconds</span>
        </div>
      </div>

      <p class="message" id="message">We're getting married 💍</p>
    </article>

    <div class="venue">
      <p class="venue-label">Wedding Venue</p>
      <a class="venue-link" href="https://maps.app.goo.gl/qic396eczJiEC39h8" target="_blank" rel="noopener">
        <span class="venue-name">Trống Đồng Palace – Cảnh Hồ →</span>
        <span class="venue-address">173B Trường Chinh, Hà Nội</span>
      </a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
